name: OpenNotebook Download

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
    - name: Pull and Save Image
      run: |
        # 指定拉取 2.2.6 版本数据库
        docker pull surrealdb/surrealdb:v2.2.6
        docker save surrealdb/surrealdb:v2.2.6 -o surrealdb-v226.tar
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: surrealdb-v226-image
        path: surrealdb-v226.tar



